name: ClaudeUsage
options:
  bundleIdPrefix: com.marcovhv.claudeusage
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "3ML6V62AF5"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "Apple Development"
    ENABLE_HARDENED_RUNTIME: NO
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO

targets:
  ClaudeUsage:
    type: application
    platform: macOS
    sources:
      - path: Sources/App
        excludes:
          - "Info.plist"
          - "App.entitlements"
      - path: Sources/Shared
      - path: Resources/Assets.xcassets
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: "AI Usage"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "© 2026"
    entitlements:
      path: Sources/App/App.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcovhv.claudeusage
        PRODUCT_NAME: "AI Usage"
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ClaudeUsageWidget
        embed: true
        codeSign: true

  ClaudeUsageWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: Sources/Widget
        excludes:
          - "Info.plist"
          - "Widget.entitlements"
      - path: Sources/Shared
      - path: Resources/Assets.xcassets
    info:
      path: Sources/Widget/Info.plist
      properties:
        CFBundleDisplayName: "AI Usage Widget"
        CFBundlePackageType: "XPC!"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: Sources/Widget/Widget.entitlements
      properties:
        com.apple.security.app-sandbox: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.marcovhv.claudeusage.widget
        PRODUCT_NAME: ClaudeUsageWidget
        SKIP_INSTALL: YES
